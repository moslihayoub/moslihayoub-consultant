<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="oklch(51.1% 0.096 186.391)" />
    <title>Ayoub MOSLIH — Lead Product Designer & AI Strategy Manager</title>
    <meta name="description" content="Portfolio d'Ayoub MOSLIH, Lead Product Designer & AI Product Strategy Manager basé à Casablanca. Expert UX/UI, Design Systems et Agentic Workflows." />
    <!-- Open Graph -->
    <meta property="og:title" content="Ayoub MOSLIH — Lead Product Designer" />
    <meta property="og:description" content="Portfolio de Ayoub MOSLIH — UX/UI Design, IA & Product Strategy" />
    <meta property="og:type" content="website" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
  </head>
  <body>
    <div id="root">
      <style>
        body { margin: 0; background-color: #FAFAFA; }
        .initial-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          font-family: system-ui, -apple-system, sans-serif;
        }
        .skeleton-logo {
          width: 48px;
          height: 48px;
          border-radius: 12px;
          background: #e2e8f0;
          animation: pulse 1.5s infinite ease-in-out;
          margin-bottom: 24px;
        }
        .skeleton-bar {
          height: 12px;
          background: #e2e8f0;
          border-radius: 6px;
          animation: pulse 1.5s infinite ease-in-out;
          margin-bottom: 12px;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.4; }
        }
      </style>
      <div class="initial-loader">
        <div class="skeleton-logo"></div>
        <div class="skeleton-bar" style="width: 200px;"></div>
        <div class="skeleton-bar" style="width: 140px;"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
